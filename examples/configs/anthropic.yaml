# Anthropic Claude configuration
# Set ANTHROPIC_API_KEY environment variable before running.
#
# Usage:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   matter run --task "Review this code for bugs" --workspace ./my-project --config examples/configs/anthropic.yaml

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  timeout: 30s
  max_retries: 3

agent:
  max_steps: 20
  max_duration: 2m
  max_cost_usd: 3.00

tools:
  enable_workspace_read: true
  enable_workspace_write: false
  enable_web_fetch: false
  enable_command_exec: false
