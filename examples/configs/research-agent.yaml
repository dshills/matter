# Research agent configuration
# Read-only agent with web access for researching topics.
# Does not modify the workspace.
#
# Usage:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   matter run --task "Research best practices for Go error handling" --workspace . --config examples/configs/research-agent.yaml

llm:
  provider: anthropic
  model: claude-sonnet-4-20250514
  timeout: 30s
  max_retries: 3

agent:
  max_steps: 15
  max_duration: 3m
  max_cost_usd: 2.00
  max_asks: 0   # no conversation mode -- fully autonomous

tools:
  enable_workspace_read: true
  enable_workspace_write: false
  enable_web_fetch: true
  enable_command_exec: false
  web_fetch_allowed_domains:
    - api.github.com
    - raw.githubusercontent.com
    - pkg.go.dev
    - docs.python.org

sandbox:
  max_web_response_bytes: 524288   # 512 KB
