# Google Gemini configuration
# Set GEMINI_API_KEY environment variable before running.
#
# Usage:
#   export GEMINI_API_KEY=AI...
#   matter run --task "Explain this project" --workspace . --config examples/configs/gemini.yaml

llm:
  provider: gemini
  model: gemini-2.5-flash-preview-04-17
  timeout: 30s
  max_retries: 3

agent:
  max_steps: 20
  max_duration: 2m
  max_cost_usd: 3.00

tools:
  enable_workspace_read: true
  enable_workspace_write: false
  enable_web_fetch: false
  enable_command_exec: false
